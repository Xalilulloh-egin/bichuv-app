<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✂️ Bichuv Boshqaruv</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:#1e293b;background:#fff}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyOH2okzwcz4bCJm39ysGNWI33VAr7Y8trxDlPOmvz4EyLRQlZfcSgIO6TjQW6hQ04f/exec";

function NumInput({style,...props}){
  const ref=useRef(null);
  useEffect(()=>{const el=ref.current;if(!el)return;const p=(e)=>e.preventDefault();el.addEventListener("wheel",p,{passive:false});return()=>el.removeEventListener("wheel",p);},[]);
  return <input ref={ref} type="number" {...props} style={style}/>;
}

function App(){
  const[tab,setTab]=useState("dashboard");
  const[view,setView]=useState("list");
  const[allData,setAllData]=useState([]);
  const[connected,setConnected]=useState(false);
  const[loading,setLoading]=useState(false);
  const[selected,setSelected]=useState(null);
  const[search,setSearch]=useState("");
  const[toast,setToast]=useState("");
  const[activeSizes,setActiveSizes]=useState([]);
  const[reja,setReja]=useState({});
  const[fakt,setFakt]=useState({});
  const[saving,setSaving]=useState(false);
  const[dashFilter,setDashFilter]=useState("all");
  const[hisobotTab,setHisobotTab]=useState("trim");
  const[sortCol,setSortCol]=useState("id");
  const[sortDir,setSortDir]=useState("asc");
  const[bichForm,setBichForm]=useState(null); // {partiya, trimId, ...}

  const flash=(m)=>{setToast(m);setTimeout(()=>setToast(""),2200);};

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const res=await fetch(SCRIPT_URL+"?action=getAllData");
      const d=await res.json();
      if(d.status==="ok"&&d.data){setAllData(d.data);setConnected(true);flash("Yuklandi ✓");}
      else flash("Xatolik");
    }catch(e){console.error(e);flash("Ulanish xatosi");}
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[]);

  // Stats
  const umumiy=useMemo(()=>{
    const r={trimSoni:allData.length,jamiZakaz:0,jamiMavjud:0,jamiPartiyaKg:0,jamiBichildi:0,jamiQoldiq:0,jamiDona:0,jamiPartiya:0,jamiRejaD:0,jamiFaktD:0,activeCount:0,waitingCount:0};
    allData.forEach(t=>{
      r.jamiZakaz+=t.orderQty||0;r.jamiMavjud+=t.mavjudKg||0;
      const parts=t.partiyalar||[];r.jamiPartiya+=parts.length;
      if(parts.length>0)r.activeCount++;else r.waitingCount++;
      parts.forEach(p=>{r.jamiPartiyaKg+=p.partiyaKg||0;r.jamiBichildi+=p.bichildiKg||0;r.jamiQoldiq+=p.qoldiqKg||0;});
      if(t.sizes){(t.sizes.active||[]).forEach(sz=>{r.jamiRejaD+=Number(t.sizes.reja?.[sz])||0;r.jamiFaktD+=Number(t.sizes.fakt?.[sz])||0;});}
    });
    r.bichilganPct=r.jamiPartiyaKg>0?((r.jamiBichildi/r.jamiPartiyaKg)*100).toFixed(1):"0";
    r.farqDona=r.jamiRejaD-r.jamiFaktD;
    return r;
  },[allData]);

  const trimStats=useMemo(()=>{
    return allData.map(t=>{
      const parts=t.partiyalar||[];
      const st={partiyaKg:0,bichildi:0,qoldiq:0,partCount:parts.length};
      parts.forEach(p=>{st.partiyaKg+=p.partiyaKg||0;st.bichildi+=p.bichildiKg||0;st.qoldiq+=p.qoldiqKg||0;});
      st.status=parts.length>0?"active":"waiting";
      st.bichPct=st.partiyaKg>0?((st.bichildi/st.partiyaKg)*100).toFixed(0):"0";
      return{...t,st};
    });
  },[allData]);

  const openTrim=(item)=>{
    setSelected(item);
    if(item.sizes){setActiveSizes(item.sizes.active||[]);setReja(item.sizes.reja||{});setFakt(item.sizes.fakt||{});}
    else{setActiveSizes([]);setReja({});setFakt({});}
    setView("detail");setTab("trim");
  };

  const saveFakt=async()=>{
    setSaving(true);
    try{await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"saveFaktRazmer",trimId:selected.id,sizes:activeSizes,fakt})});}catch(e){}
    setAllData(prev=>prev.map(t=>{
      if(t.id!==selected.id)return t;
      const old=t.sizes||{group:"harf",active:[],reja:{}};
      return{...t,sizes:{...old,active:activeSizes,fakt}};
    }));
    setSaving(false);flash("Fakt saqlandi ✓");
  };

  const openBichForm=(p)=>{
    setBichForm({partiya:p.partiya,trimId:selected.id,mahsulot:selected.name,rangi:selected.color,
      sana:new Date().toISOString().slice(0,10),bichildiKg:"",topBoshi:"",otxod:"",dona:"",partiyaKg:p.partiyaKg});
    setView("bichish");
  };

  const saveBichish=async()=>{
    if(!bichForm.bichildiKg){flash("Бичилди кг kiriting");return;}
    setSaving(true);
    const b=+bichForm.bichildiKg||0,t=+bichForm.topBoshi||0,o=+bichForm.otxod||0;
    const payload={action:"saveBichish",...bichForm,bichildiKg:b,topBoshi:t,otxod:o,dona:+bichForm.dona||0};
    try{await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(payload)});flash("Saqlandi ✓");}
    catch(e){flash("Xatolik");}
    setSaving(false);setBichForm(null);setView("detail");
    setTimeout(()=>load(),1500);
  };

  const curParts=selected?.partiyalar||[];
  const curStats=useMemo(()=>{
    const st={partiyaKg:0,bichildi:0,qoldiq:0,tayyor:0,bichilgan:0};
    curParts.forEach(p=>{
      st.partiyaKg+=p.partiyaKg||0;st.bichildi+=p.bichildiKg||0;st.qoldiq+=p.qoldiqKg||0;
      if((p.holat||'').includes('бичилмаган'))st.tayyor++;
      if((p.holat||'').includes('бичилган')||p.bichildiKg>0)st.bichilgan++;
    });
    st.bichPct=st.partiyaKg>0?((st.bichildi/st.partiyaKg)*100).toFixed(1):"0";
    return st;
  },[curParts]);

  const totalReja=activeSizes.reduce((s,sz)=>s+(+reja[sz]||0),0);
  const totalFakt=activeSizes.reduce((s,sz)=>s+(+fakt[sz]||0),0);

  const filteredTrims=trimStats.filter(t=>{
    if(dashFilter==="active"&&t.st.status!=="active")return false;
    if(dashFilter==="waiting"&&t.st.status!=="waiting")return false;
    if(search&&!(t.id+t.name+t.color).toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const allPartiyalar=useMemo(()=>{
    const list=[];
    allData.forEach(t=>{(t.partiyalar||[]).forEach(p=>{list.push({...p,trimId:t.id,trimName:t.name,color:t.color});});});
    return list.sort((a,b)=>(a.sana||"").localeCompare(b.sana||"")).reverse();
  },[allData]);

  const sortedTrims=useMemo(()=>{
    const arr=[...trimStats];
    arr.sort((a,b)=>{let va,vb;
      switch(sortCol){case"id":va=a.id;vb=b.id;break;case"zakaz":va=a.orderQty;vb=b.orderQty;break;
      case"partiyaKg":va=a.st.partiyaKg;vb=b.st.partiyaKg;break;case"bichildi":va=a.st.bichildi;vb=b.st.bichildi;break;
      case"qoldiq":va=a.st.qoldiq;vb=b.st.qoldiq;break;default:va=a.id;vb=b.id;}
      if(typeof va==="string")return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va);
      return sortDir==="asc"?va-vb:vb-va;
    });return arr;
  },[trimStats,sortCol,sortDir]);

  const toggleSort=(col)=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};
  const sortIcon=(col)=>sortCol===col?(sortDir==="asc"?" ↑":" ↓"):"";

  // ========== BICHISH FORM (kg + razmer birgalikda) ==========
  if(view==="bichish"&&bichForm){
    const b=+bichForm.bichildiKg||0,tb=+bichForm.topBoshi||0,o=+bichForm.otxod||0;
    const toza=b>0?(b-tb-o).toFixed(1):0;
    const hasReja=activeSizes.length>0&&activeSizes.some(sz=>+reja[sz]>0);
    const rTotalFakt=activeSizes.reduce((s,sz)=>s+(+fakt[sz]||0),0);
    return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <Hdr left={<Back onClick={()=>{setView("detail");setBichForm(null);}}/>} title="✂️ Bichish"/>
      <div style={S.infoMini}>
        <span style={S.miniId}>{bichForm.trimId}</span>
        <span style={S.miniClr}>Partiya: {bichForm.partiya} — {bichForm.partiyaKg} кг</span>
      </div>

      {/* KG bo'limi */}
      <div style={S.card}>
        <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Kilogramlar</div>
        <Lbl>Бичилди кг (жами)</Lbl>
        <NumInput style={{...S.inp,...S.inpN,fontSize:20,padding:14,borderColor:"#93c5fd",background:"#eff6ff",marginBottom:10}}
          inputMode="decimal" value={bichForm.bichildiKg} placeholder="0"
          onChange={e=>setBichForm(p=>({...p,bichildiKg:e.target.value}))}/>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <Lbl>Топ боши кг</Lbl>
            <NumInput style={{...S.inp,...S.inpN,borderColor:"#fdba74",background:"#fff7ed"}} inputMode="decimal"
              value={bichForm.topBoshi} placeholder="0" onChange={e=>setBichForm(p=>({...p,topBoshi:e.target.value}))}/>
          </div>
          <div style={{flex:1}}>
            <Lbl>Отход кг</Lbl>
            <NumInput style={{...S.inp,...S.inpN,borderColor:"#fca5a5",background:"#fef2f2"}} inputMode="decimal"
              value={bichForm.otxod} placeholder="0" onChange={e=>setBichForm(p=>({...p,otxod:e.target.value}))}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1,padding:10,background:"#f0fdf4",borderRadius:8,border:"1px solid #86efac",textAlign:"center"}}>
            <div style={{fontSize:10,color:"#16a34a",fontWeight:600}}>ТОЗА</div>
            <div style={{fontSize:18,fontWeight:800,color:"#166534"}}>{toza} кг</div>
          </div>
          <div style={{flex:1}}>
            <Lbl>Дона (жами)</Lbl>
            <NumInput style={{...S.inp,...S.inpN,borderColor:"#c4b5fd",background:"#faf5ff"}} inputMode="numeric"
              value={bichForm.dona} placeholder="0" onChange={e=>setBichForm(p=>({...p,dona:e.target.value}))}/>
          </div>
        </div>
      </div>

      {/* RAZMER bo'limi */}
      {hasReja&&(
        <div style={S.card}>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Razmer bo'yicha dona</div>
          <div style={{border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:"#f1f5f9"}}>
                <th style={{padding:"8px 6px",fontSize:11,fontWeight:700,color:"#475569",textAlign:"center",width:50}}>Razmer</th>
                <th style={{padding:"8px 6px",fontSize:11,fontWeight:700,color:"#2563eb",textAlign:"center"}}>Reja</th>
                <th style={{padding:"8px 6px",fontSize:11,fontWeight:700,color:"#16a34a",textAlign:"center"}}>Fakt</th>
                <th style={{padding:"8px 6px",fontSize:11,fontWeight:700,color:"#64748b",textAlign:"center",width:55}}>Farq</th>
              </tr></thead>
              <tbody>{activeSizes.map(sz=>{
                const r=+reja[sz]||0,f=+fakt[sz]||0,d=r-f;
                return(<tr key={sz} style={{borderTop:"1px solid #f1f5f9"}}>
                  <td style={{padding:"6px",textAlign:"center",fontWeight:800,fontSize:15}}>{sz}</td>
                  <td style={{padding:"6px",textAlign:"center",fontSize:16,fontWeight:700,color:"#2563eb",background:"#f8fafc"}}>{r}</td>
                  <td style={{padding:"4px 6px",textAlign:"center"}}>
                    <NumInput style={{width:"100%",padding:"8px 4px",fontSize:16,fontWeight:700,textAlign:"center",border:"1.5px solid #86efac",borderRadius:8,background:f>0?"#f0fdf4":"#fff",color:"#166534",outline:"none",boxSizing:"border-box"}}
                      inputMode="numeric" value={fakt[sz]||""} placeholder="0"
                      onChange={e=>setFakt(p=>({...p,[sz]:e.target.value}))}/>
                  </td>
                  <td style={{padding:"6px",textAlign:"center",fontWeight:700,fontSize:14,color:d>0?"#dc2626":d<=0?"#16a34a":"#94a3b8"}}>{d>0?`−${d}`:d<0?`+${Math.abs(d)}`:"✓"}</td>
                </tr>);
              })}</tbody>
              <tfoot><tr style={{borderTop:"2px solid #e2e8f0",background:"#f8fafc"}}>
                <td style={{padding:"8px 6px",fontWeight:800,textAlign:"center",fontSize:12}}>Jami</td>
                <td style={{padding:"8px 6px",fontWeight:700,textAlign:"center",color:"#2563eb",fontSize:14}}>{totalReja.toLocaleString()}</td>
                <td style={{padding:"8px 6px",fontWeight:700,textAlign:"center",color:"#16a34a",fontSize:14}}>{rTotalFakt.toLocaleString()}</td>
                <td style={{padding:"8px 6px",fontWeight:800,textAlign:"center",fontSize:13,color:(totalReja-rTotalFakt)>0?"#dc2626":"#16a34a"}}>{(totalReja-rTotalFakt)>0?`−${(totalReja-rTotalFakt).toLocaleString()}`:"✓"}</td>
              </tr></tfoot>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:"1px solid #e2e8f0",fontSize:12}}>
            <span>Reja: <b>{totalReja.toLocaleString()}</b></span>
            <span>Fakt: <b style={{color:"#16a34a"}}>{rTotalFakt.toLocaleString()}</b></span>
            <span style={{color:(totalReja-rTotalFakt)>0?"#dc2626":"#16a34a",fontWeight:700}}>Farq: {(totalReja-rTotalFakt)>0?`−${(totalReja-rTotalFakt).toLocaleString()}`:"✓"}</span>
          </div>
        </div>
      )}

      <Btn primary full style={{marginTop:4,padding:14,fontSize:16}} onClick={async()=>{
        setSaving(true);
        const bi=+bichForm.bichildiKg||0,tp=+bichForm.topBoshi||0,ot=+bichForm.otxod||0;
        // Save bichish
        if(bi>0){
          try{await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"saveBichish",...bichForm,bichildiKg:bi,topBoshi:tp,otxod:ot,dona:+bichForm.dona||0})});}catch(e){}
        }
        // Save razmer fakt
        if(hasReja){
          try{await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"saveFaktRazmer",trimId:selected.id,sizes:activeSizes,fakt})});}catch(e){}
          setAllData(prev=>prev.map(t=>{if(t.id!==selected.id)return t;const old=t.sizes||{group:"harf",active:[],reja:{}};return{...t,sizes:{...old,active:activeSizes,fakt}};}));
        }
        setSaving(false);flash("Saqlandi ✓");setBichForm(null);setView("detail");
        setTimeout(()=>load(),1500);
      }} disabled={saving}>{saving?"Saqlanmoqda...":"💾 Barchasini saqlash"}</Btn>
    </Shell>);
  }

  // ========== RAZMER ==========
  if(view==="razmer"&&selected){
    const hasReja=activeSizes.length>0&&activeSizes.some(sz=>+reja[sz]>0);
    return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <Hdr left={<Back onClick={()=>setView("detail")}/>} title="Razmerlar"/>
      <div style={S.infoMini}><span style={S.miniId}>{selected.id}</span><span style={S.miniClr}>{selected.color} — Zakaz: {selected.orderQty?.toLocaleString()}</span></div>
      {!hasReja?(
        <div style={{...S.card,background:"#fef3c7",borderColor:"#fde68a",textAlign:"center",padding:20}}>
          <div style={{fontSize:28,marginBottom:8}}>📋</div>
          <div style={{fontSize:14,fontWeight:600,color:"#92400e",marginBottom:4}}>Reja topilmadi</div>
          <div style={{fontSize:12,color:"#a16207"}}>Sheets dagi "Razmerlar rejasi" varag'iga bu trimkarta uchun razmerlar kiriting.</div>
        </div>
      ):(<>
        <Lbl style={{marginTop:12}}>Razmer bo'yicha reja va fakt</Lbl>
        <div style={{...S.card,padding:0,overflow:"hidden"}}>
          <table style={S.tbl}><thead><tr>
            <th style={{...S.th,textAlign:"left",paddingLeft:14}}>Razmer</th>
            <th style={{...S.th,color:"#64748b",background:"#f1f5f9"}}>📋 Reja</th>
            <th style={{...S.th,color:"#16a34a"}}>✅ Fakt</th>
            <th style={S.th}>Farq</th><th style={S.th}>%</th>
          </tr></thead><tbody>
            {activeSizes.map(sz=>{
              const r=+reja[sz]||0,f=+fakt[sz]||0,d=r-f,pct=r>0?((f/r)*100).toFixed(0):"—";
              return(<tr key={sz}>
                <td style={{...S.td,fontWeight:700,paddingLeft:14,fontSize:15}}>{sz}</td>
                <td style={{...S.td,textAlign:"center",color:"#475569",background:"#f8fafc",fontWeight:500}}>{r>0?r.toLocaleString():"—"}</td>
                <td style={{...S.td,textAlign:"center",padding:"4px 2px"}}>
                  <NumInput style={{...S.inp,...S.inpN,maxWidth:80,margin:"0 auto",fontSize:15,borderColor:"#86efac",background:f>0?"#f0fdf4":"#fff",color:"#166534"}}
                    inputMode="numeric" value={fakt[sz]||""} placeholder="0"
                    onChange={e=>setFakt(p=>({...p,[sz]:e.target.value}))}/>
                </td>
                <td style={{...S.td,textAlign:"center",fontWeight:700,fontSize:14,color:d>0?"#dc2626":d<0?"#16a34a":"#94a3b8"}}>{d>0?`−${d.toLocaleString()}`:d<0?`+${Math.abs(d).toLocaleString()}`:"✓"}</td>
                <td style={{...S.td,textAlign:"center"}}>{r>0?<span style={{padding:"2px 6px",borderRadius:6,fontSize:10,fontWeight:600,background:+pct>=100?"#dcfce7":+pct>=50?"#fef9c3":"#fee2e2",color:+pct>=100?"#166534":+pct>=50?"#854d0e":"#991b1b"}}>{pct}%</span>:"—"}</td>
              </tr>);
            })}
          </tbody><tfoot><tr style={{borderTop:"2px solid #e2e8f0",background:"#f8fafc"}}>
            <td style={{...S.td,fontWeight:800,paddingLeft:14}}>Jami</td>
            <td style={{...S.td,textAlign:"center",fontWeight:700}}>{totalReja.toLocaleString()}</td>
            <td style={{...S.td,textAlign:"center",fontWeight:700,color:"#16a34a"}}>{totalFakt.toLocaleString()}</td>
            <td style={{...S.td,textAlign:"center",fontWeight:800,color:(totalReja-totalFakt)>0?"#dc2626":"#16a34a"}}>{(totalReja-totalFakt)>0?`−${(totalReja-totalFakt).toLocaleString()}`:(totalReja-totalFakt)<0?`+${Math.abs(totalReja-totalFakt).toLocaleString()}`:"✓"}</td>
            <td style={{...S.td,textAlign:"center",fontSize:11,fontWeight:600}}>{totalReja>0?((totalFakt/totalReja)*100).toFixed(0)+"%":"—"}</td>
          </tr></tfoot></table>
        </div>
        <Btn primary full style={{marginTop:16}} onClick={saveFakt} disabled={saving}>{saving?"Saqlanmoqda...":"Fakt saqlash"}</Btn>
        <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:8}}>📋 Reja — faqat Google Sheets dan</p>
      </>)}
    </Shell>);
  }

  // ========== DETAIL ==========
  if(view==="detail"&&selected){
    const hasReja=activeSizes.length>0&&activeSizes.some(sz=>+reja[sz]>0);
    return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <Hdr left={<Back onClick={()=>{setView("list");setSelected(null);setTab("trim");}}/>} title={selected.id}/>
      <div style={S.card}>
        <div style={{fontSize:13,color:"#334155",fontWeight:500,marginBottom:4}}>{selected.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{...S.dot,background:getColor(selected.color)}}/><span style={{fontSize:13,color:"#64748b"}}>{selected.color}</span>
          <span style={{color:"#cbd5e1"}}>•</span><span style={{fontSize:13,fontWeight:600}}>Zakaz: {selected.orderQty?.toLocaleString()} dona</span>
        </div>
      </div>

      {/* Ombor xulosasi */}
      {curParts.length>0&&(
        <div style={{...S.card,background:"#f8fafc",padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Mato holati</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <SBox label="Partiya кг" value={`${curStats.partiyaKg.toLocaleString()}`} color="#2563eb"/>
            <SBox label="Бичилган кг" value={`${curStats.bichildi.toLocaleString()}`} color="#16a34a"/>
            <SBox label="Қолдиқ кг" value={`${curStats.qoldiq.toLocaleString()}`} color="#ea580c"/>
          </div>
          <div style={{marginTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
              <span style={{color:"#64748b"}}>Bichilish: {curStats.bichPct}%</span>
              <span style={{color:"#64748b"}}>{curParts.length} partiya</span>
            </div>
            <div style={{height:8,background:"#e2e8f0",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(+curStats.bichPct,100)}%`,background:"linear-gradient(90deg,#2563eb,#16a34a)",borderRadius:4}}/>
            </div>
          </div>
        </div>
      )}

      {/* Razmer reja qisqa ko'rinish */}
      {hasReja&&(
        <div style={{...S.card,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:0.5}}>Razmer rejasi</div>
            <button style={{border:"none",background:"none",color:"#2563eb",fontSize:12,fontWeight:600,cursor:"pointer"}} onClick={()=>setView("razmer")}>Batafsil →</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {activeSizes.map(sz=>{
              const r=+reja[sz]||0,f=+fakt[sz]||0;
              const done=r>0&&f>=r;
              return(<div key={sz} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+(done?"#86efac":"#e2e8f0"),background:done?"#f0fdf4":"#fff",fontSize:12,textAlign:"center",minWidth:55}}>
                <div style={{fontWeight:700,color:"#334155"}}>{sz}</div>
                <div style={{fontSize:10,color:done?"#16a34a":"#64748b"}}>{f}/{r}</div>
              </div>);
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:12}}>
            <span>Reja: <b>{totalReja.toLocaleString()}</b></span>
            <span>Fakt: <b style={{color:"#16a34a"}}>{totalFakt.toLocaleString()}</b></span>
            <span style={{color:(totalReja-totalFakt)>0?"#dc2626":"#16a34a",fontWeight:700}}>Farq: {(totalReja-totalFakt)>0?`−${(totalReja-totalFakt).toLocaleString()}`:"✓"}</span>
          </div>
        </div>
      )}

      {!hasReja&&(
        <button style={{...S.card,width:"100%",textAlign:"center",cursor:"pointer",padding:14,border:"1.5px dashed #cbd5e1"}} onClick={()=>setView("razmer")}>
          <span style={{fontSize:13,color:"#64748b"}}>📐 Razmerlar</span>
        </button>
      )}

      {/* Partiyalar ro'yxati */}
      <Lbl style={{marginTop:12}}>Partiyalar ({curParts.length})</Lbl>
      {curParts.length===0?<div style={{textAlign:"center",padding:30,color:"#94a3b8",fontSize:14}}>Bu trimkarta uchun partiya yo'q</div>:(
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {curParts.map((p,i)=>{
            const bichPct=p.partiyaKg>0?((p.bichildiKg/p.partiyaKg)*100).toFixed(0):"0";
            const isTayyor=(p.holat||'').includes('бичилмаган');
            return(
            <div key={i} style={{...S.pCard,borderLeft:`3px solid ${isTayyor?"#f59e0b":p.bichildiKg>0?"#16a34a":"#e2e8f0"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div>
                  <span style={{fontWeight:700,color:"#1e40af",fontFamily:"monospace",fontSize:14}}>{p.partiya}</span>
                  <span style={{color:"#94a3b8",fontSize:11,marginLeft:8}}>{p.sana}</span>
                </div>
                <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:6,
                  background:isTayyor?"#fef3c7":p.bichildiKg>0?"#dcfce7":"#f1f5f9",
                  color:isTayyor?"#92400e":p.bichildiKg>0?"#166534":"#64748b"
                }}>{isTayyor?"Kutmoqda":p.bichildiKg>0?"Bichilgan":"—"}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:12}}>
                <div><div style={{color:"#2563eb",fontWeight:700,fontSize:14}}>{p.partiyaKg.toLocaleString()} кг</div><div style={{fontSize:10,color:"#94a3b8"}}>Partiya</div></div>
                <div><div style={{color:"#16a34a",fontWeight:700,fontSize:14}}>{p.bichildiKg.toLocaleString()} кг</div><div style={{fontSize:10,color:"#94a3b8"}}>Бичилган</div></div>
                <div><div style={{color:"#ea580c",fontWeight:700,fontSize:14}}>{p.qoldiqKg.toLocaleString()} кг</div><div style={{fontSize:10,color:"#94a3b8"}}>Қолдиқ</div></div>
              </div>
              {p.partiyaKg>0&&(<div style={{marginTop:6}}>
                <div style={{height:4,background:"#e2e8f0",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(+bichPct,100)}%`,background:+bichPct>=100?"#16a34a":"#2563eb",borderRadius:2}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                  <div style={{fontSize:10,color:"#94a3b8"}}>{bichPct}% bichilgan</div>
                  <button style={{border:"none",background:"#2563eb",color:"#fff",fontSize:11,fontWeight:600,padding:"3px 12px",borderRadius:6,cursor:"pointer"}}
                    onClick={(e)=>{e.stopPropagation();openBichForm(p);}}>✂️ Bichish</button>
                </div>
              </div>)}
            </div>);
          })}
        </div>
      )}
    </Shell>);
  }

  // ========== DASHBOARD ==========
  if(tab==="dashboard"&&connected)return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 10px",borderBottom:"1px solid #e2e8f0",marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:800,margin:0}}>📊 Dashboard</h1>
        <button style={{border:"none",background:"none",fontSize:18,cursor:"pointer"}} onClick={load}>🔄</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <KPI icon="📦" label="Jami partiya" value={`${umumiy.jamiPartiyaKg.toLocaleString()} кг`} color="#2563eb"/>
        <KPI icon="✂️" label="Бичилган" value={`${umumiy.jamiBichildi.toLocaleString()} кг`} color="#16a34a"/>
        <KPI icon="📏" label="Қолдиқ" value={`${umumiy.jamiQoldiq.toLocaleString()} кг`} color="#ea580c"/>
        <KPI icon="🧾" label="Partiyalar" value={umumiy.jamiPartiya} color="#7c3aed"/>
      </div>

      <div style={{...S.card,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
          <span>Bichilish: <b>{umumiy.bichilganPct}%</b></span>
          <span>{umumiy.trimSoni} trimkarta</span>
        </div>
        <div style={{height:10,background:"#f1f5f9",borderRadius:6,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(+umumiy.bichilganPct,100)}%`,background:"linear-gradient(90deg,#2563eb,#16a34a)",borderRadius:6}}/>
        </div>
      </div>

      {umumiy.jamiRejaD>0&&(
        <div style={{...S.card,padding:14,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Razmer reja / fakt</div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
            <span>Reja: <b>{umumiy.jamiRejaD.toLocaleString()}</b></span>
            <span>Fakt: <b>{umumiy.jamiFaktD.toLocaleString()}</b></span>
            <span style={{color:umumiy.farqDona>0?"#dc2626":"#16a34a",fontWeight:700}}>Farq: {umumiy.farqDona>0?`−${umumiy.farqDona.toLocaleString()}`:"✓"}</span>
          </div>
          <div style={{height:8,background:"#f1f5f9",borderRadius:6,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(umumiy.jamiRejaD>0?(umumiy.jamiFaktD/umumiy.jamiRejaD)*100:0,100)}%`,background:"linear-gradient(90deg,#7c3aed,#2563eb)",borderRadius:6}}/>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["all",`Hammasi (${umumiy.trimSoni})`],["active",`Faol (${umumiy.activeCount})`],["waiting",`Kutmoqda (${umumiy.waitingCount})`]].map(([k,l])=>(
          <button key={k} style={{...S.tabBtn,flex:1,fontSize:11,...(dashFilter===k?S.tabAct:{})}} onClick={()=>setDashFilter(k)}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filteredTrims.map(t=>(
          <button key={t.id} style={{...S.listItem,padding:"10px 12px"}} onClick={()=>openTrim(t)}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontWeight:700,color:"#1e40af",fontFamily:"monospace",fontSize:12}}>{t.id}</span>
              <span style={{fontSize:11,color:t.st.status==="active"?"#16a34a":"#94a3b8",fontWeight:600}}>{t.st.status==="active"?`● ${t.st.partCount} partiya`:"○ Kutmoqda"}</span>
            </div>
            <div style={{fontSize:12,color:"#334155",marginBottom:4}}>{t.name} — <span style={{color:"#64748b"}}>{t.color}</span></div>
            {t.st.partCount>0?(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,fontSize:11}}>
                <span><b style={{color:"#2563eb"}}>{t.st.partiyaKg.toLocaleString()}</b> кг</span>
                <span><b style={{color:"#16a34a"}}>{t.st.bichildi.toLocaleString()}</b> бичилган</span>
                <span><b style={{color:"#ea580c"}}>{t.st.qoldiq.toLocaleString()}</b> қолдиқ</span>
              </div>
            ):(<div style={{fontSize:11,color:"#94a3b8"}}>Zakaz: {t.orderQty?.toLocaleString()} dona</div>)}
          </button>
        ))}
      </div>
    </Shell>
  );

  // ========== HISOBOT ==========
  if(tab==="hisobot"&&connected)return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <div style={{padding:"16px 0 10px",borderBottom:"1px solid #e2e8f0",marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:800,margin:0}}>📋 Hisobot</h1>
      </div>
      <div style={S.tabs}>
        <button style={{...S.tabBtn,...(hisobotTab==="trim"?S.tabAct:{})}} onClick={()=>setHisobotTab("trim")}>Trimkarta</button>
        <button style={{...S.tabBtn,...(hisobotTab==="partiya"?S.tabAct:{})}} onClick={()=>setHisobotTab("partiya")}>Partiyalar</button>
      </div>
      {hisobotTab==="trim"?(
        <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0",marginTop:10}}>
          <table style={{...S.tbl,minWidth:600}}><thead><tr style={{background:"#f1f5f9"}}>
            <th style={S.rth} onClick={()=>toggleSort("id")}>Trim{sortIcon("id")}</th>
            <th style={{...S.rth,minWidth:120}}>Mahsulot</th><th style={S.rth}>Rangi</th>
            <th style={S.rth} onClick={()=>toggleSort("zakaz")}>Zakaz{sortIcon("zakaz")}</th>
            <th style={S.rth} onClick={()=>toggleSort("partiyaKg")}>Partiya кг{sortIcon("partiyaKg")}</th>
            <th style={S.rth} onClick={()=>toggleSort("bichildi")}>Бичилган{sortIcon("bichildi")}</th>
            <th style={S.rth} onClick={()=>toggleSort("qoldiq")}>Қолдиқ{sortIcon("qoldiq")}</th>
            <th style={S.rth}>%</th>
          </tr></thead><tbody>
            {sortedTrims.map(t=>(
              <tr key={t.id} style={{cursor:"pointer"}} onClick={()=>openTrim(t)}>
                <td style={{...S.rtd,fontWeight:700,color:"#1e40af",fontFamily:"monospace"}}>{t.id}</td>
                <td style={{...S.rtd,fontSize:11,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</td>
                <td style={S.rtd}>{t.color}</td>
                <td style={{...S.rtd,fontWeight:600}}>{t.orderQty?.toLocaleString()}</td>
                <td style={{...S.rtd,color:"#2563eb",fontWeight:600}}>{t.st.partiyaKg>0?t.st.partiyaKg.toLocaleString():"—"}</td>
                <td style={{...S.rtd,color:"#16a34a",fontWeight:600}}>{t.st.bichildi>0?t.st.bichildi.toLocaleString():"—"}</td>
                <td style={{...S.rtd,color:"#ea580c"}}>{t.st.qoldiq>0?t.st.qoldiq.toLocaleString():"—"}</td>
                <td style={S.rtd}>{t.st.partiyaKg>0?<span style={{padding:"2px 6px",borderRadius:6,fontSize:10,fontWeight:600,background:+t.st.bichPct>=100?"#dcfce7":+t.st.bichPct>=50?"#fef9c3":"#fee2e2",color:+t.st.bichPct>=100?"#166534":+t.st.bichPct>=50?"#854d0e":"#991b1b"}}>{t.st.bichPct}%</span>:"—"}</td>
              </tr>
            ))}
          </tbody><tfoot><tr style={{background:"#f8fafc",borderTop:"2px solid #cbd5e1"}}>
            <td style={{...S.rtd,fontWeight:800}} colSpan={3}>JAMI</td>
            <td style={{...S.rtd,fontWeight:700}}>{umumiy.jamiZakaz.toLocaleString()}</td>
            <td style={{...S.rtd,fontWeight:700,color:"#2563eb"}}>{umumiy.jamiPartiyaKg.toLocaleString()}</td>
            <td style={{...S.rtd,fontWeight:700,color:"#16a34a"}}>{umumiy.jamiBichildi.toLocaleString()}</td>
            <td style={{...S.rtd,fontWeight:700,color:"#ea580c"}}>{umumiy.jamiQoldiq.toLocaleString()}</td>
            <td style={{...S.rtd,fontWeight:700}}>{umumiy.bichilganPct}%</td>
          </tr></tfoot></table>
        </div>
      ):(
        <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0",marginTop:10}}>
          <table style={{...S.tbl,minWidth:600}}><thead><tr style={{background:"#f1f5f9"}}>
            <th style={S.rth}>Sana</th><th style={S.rth}>Partiya</th><th style={S.rth}>Trim</th>
            <th style={S.rth}>Rangi</th><th style={S.rth}>Partiya кг</th><th style={S.rth}>Бичилган</th><th style={S.rth}>Қолдиқ</th><th style={S.rth}>Холат</th>
          </tr></thead><tbody>
            {allPartiyalar.map((p,i)=>{
              const isTayyor=(p.holat||'').includes('бичилмаган');
              return(<tr key={i}>
                <td style={{...S.rtd,whiteSpace:"nowrap"}}>{p.sana}</td>
                <td style={{...S.rtd,fontWeight:700,color:"#1e40af",fontFamily:"monospace"}}>{p.partiya}</td>
                <td style={{...S.rtd,fontFamily:"monospace",fontSize:11}}>{p.trimId}</td>
                <td style={S.rtd}>{p.rangi||p.color}</td>
                <td style={{...S.rtd,color:"#2563eb",fontWeight:600}}>{p.partiyaKg?.toLocaleString()}</td>
                <td style={{...S.rtd,color:"#16a34a",fontWeight:600}}>{p.bichildiKg?.toLocaleString()}</td>
                <td style={{...S.rtd,color:"#ea580c"}}>{p.qoldiqKg?.toLocaleString()}</td>
                <td style={S.rtd}><span style={{fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:6,background:isTayyor?"#fef3c7":"#dcfce7",color:isTayyor?"#92400e":"#166534"}}>{isTayyor?"Kutmoqda":"Bichilgan"}</span></td>
              </tr>);
            })}
          </tbody><tfoot><tr style={{background:"#f8fafc",borderTop:"2px solid #cbd5e1"}}>
            <td style={{...S.rtd,fontWeight:800}} colSpan={4}>JAMI ({allPartiyalar.length})</td>
            <td style={{...S.rtd,fontWeight:700,color:"#2563eb"}}>{umumiy.jamiPartiyaKg.toLocaleString()}</td>
            <td style={{...S.rtd,fontWeight:700,color:"#16a34a"}}>{umumiy.jamiBichildi.toLocaleString()}</td>
            <td style={{...S.rtd,fontWeight:700,color:"#ea580c"}}>{umumiy.jamiQoldiq.toLocaleString()}</td>
            <td style={S.rtd}></td>
          </tr></tfoot></table>
        </div>
      )}
    </Shell>
  );

  // ========== TRIM LIST ==========
  if(tab==="trim"&&connected)return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <div style={{padding:"16px 0 10px",borderBottom:"1px solid #e2e8f0",marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:800,margin:0}}>✂️ Trimkartalar</h1>
      </div>
      <input style={S.searchInp} placeholder="Qidirish..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{fontSize:12,color:"#94a3b8",margin:"8px 0 6px"}}>{filteredTrims.length} ta</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filteredTrims.map(t=>(
          <button key={t.id} style={S.listItem} onClick={()=>openTrim(t)}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontWeight:700,color:"#1e40af",fontFamily:"monospace",fontSize:13}}>{t.id}</span>
              <span style={{fontSize:12,color:"#64748b"}}>{t.orderQty?.toLocaleString()} dona</span>
            </div>
            <div style={{fontSize:13,color:"#334155",marginBottom:4}}>{t.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{...S.dot,background:getColor(t.color)}}/><span style={{fontSize:12,color:"#64748b"}}>{t.color}</span>
              {t.st.partCount>0&&<span style={{fontSize:11,color:"#16a34a",marginLeft:8,fontWeight:600}}>✓ {t.st.partCount} partiya</span>}
            </div>
          </button>
        ))}
      </div>
    </Shell>
  );

  // ========== LOADING ==========
  return(
    <Shell tab={tab} setTab={setTab} toast={toast}>
      <div style={{textAlign:"center",padding:"80px 20px"}}>
        {loading?(<><div style={{fontSize:40,marginBottom:16}}>⏳</div><div style={{fontSize:16,fontWeight:600}}>Yuklanmoqda...</div><div style={{fontSize:13,color:"#94a3b8",marginTop:8}}>Google Sheets dan ma'lumot olinmoqda</div></>)
        :(<><div style={{fontSize:52,marginBottom:12}}>✂️</div><h2 style={{fontSize:22,fontWeight:800,margin:"0 0 8px"}}>Bichuv boshqaruvi</h2>
          <p style={{fontSize:14,color:"#64748b",marginBottom:24}}>Ulanish xatosi. Sahifani yangilang.</p>
          <Btn primary full onClick={load}>Qayta ulanish</Btn></>)}
      </div>
    </Shell>
  );
}

// ===== COMPONENTS =====
function Shell({children,tab,setTab,toast}){
  return(<div style={{maxWidth:540,margin:"0 auto",padding:"0 12px 80px",fontFamily:"'Inter',-apple-system,sans-serif",color:"#1e293b",minHeight:"100vh"}}>
    {children}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"center",zIndex:50}}>
      <div style={{display:"flex",maxWidth:540,width:"100%"}}>
        {[["dashboard","📊","Dashboard"],["trim","✂️","Trimkartalar"],["hisobot","📋","Hisobot"]].map(([k,ico,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",textAlign:"center",color:tab===k?"#2563eb":"#94a3b8",fontWeight:tab===k?700:400,fontSize:11}}>
            <div style={{fontSize:18}}>{ico}</div>{label}
          </button>
        ))}
      </div>
    </div>
    <Toast msg={toast}/>
  </div>);
}
function Hdr({left,title}){return(<div style={{display:"flex",alignItems:"center",padding:"14px 0 10px",borderBottom:"1px solid #e2e8f0",marginBottom:12,position:"sticky",top:0,background:"#fff",zIndex:10}}><div style={{width:60}}>{left}</div><h2 style={{flex:1,textAlign:"center",fontSize:16,fontWeight:700,margin:0}}>{title}</h2><div style={{width:60}}></div></div>);}
function Back({onClick}){return <button style={{border:"none",background:"none",color:"#2563eb",fontWeight:500,fontSize:14,cursor:"pointer",padding:0}} onClick={onClick}>← Ortga</button>;}
function Btn({children,primary,flex,full,style={},...r}){return <button style={{padding:"11px 18px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",border:"none",...(primary?{background:"#2563eb",color:"#fff"}:{background:"transparent",color:"#2563eb",border:"1.5px solid #2563eb"}),...(flex?{flex:1}:{}),...(full?{width:"100%"}:{}),...style}} {...r}>{children}</button>;}
function Lbl({children,style={}}){return <div style={{fontSize:12,fontWeight:600,color:"#475569",marginBottom:6,...style}}>{children}</div>;}
function SBox({label,value,color}){return <div style={{textAlign:"center",padding:"8px 4px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0"}}><div style={{fontSize:15,fontWeight:700,color}}>{value}</div><div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{label}</div></div>;}
function KPI({icon,label,value,color}){return <div style={{padding:"14px 12px",border:"1px solid #e2e8f0",borderRadius:12,background:"#fff"}}><div style={{fontSize:18,marginBottom:4}}>{icon}</div><div style={{fontSize:17,fontWeight:800,color}}>{value}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{label}</div></div>;}
function Toast({msg}){if(!msg)return null;return <div style={{position:"fixed",bottom:60,left:"50%",transform:"translateX(-50%)",padding:"10px 24px",background:"#1e293b",color:"#fff",borderRadius:10,fontSize:14,fontWeight:500,zIndex:100,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>{msg}</div>;}
